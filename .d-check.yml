# auch harness/ gescannt wird (Harness-Bootstrap, ADR-0002);
# `anchors` ist Mehr-Abdeckung (das Alt-Tool pruefte nur
# Link-Existenz). Ausbau auf ids/matrix: siehe
# docs/plan/planning/open/note-d-check-ausbau.md
# Beschreibung siehe: https://raw.githubusercontent.com/pt9912/d-check/refs/heads/main/README.md
scan:
  roots: ["."]
modules: [links, anchors]
